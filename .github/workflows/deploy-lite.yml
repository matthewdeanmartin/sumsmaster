---
name: Deploy Sumsmaster Lite
on:
  push:
    branches: [main]
    paths: [sumsmaster_lite/**, .github/workflows/deploy-lite.yml]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sumsmaster_lite
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: sumsmaster_lite/package-lock.json
      - run: npm ci
      - run: npm test -- --watch=false
      - run: npm run build -- --base-href /sumsmaster/
      - uses: actions/upload-pages-artifact@v4
        with:
          path: sumsmaster_lite/dist/sumsmaster-lite/browser
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
